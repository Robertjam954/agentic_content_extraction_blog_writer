---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.tags and page.tags.size > 0 %}
      &middot;
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      {% endif %}
    </p>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
  {% if page.source %}
  <p class="post-source">Source notes: <a href="{{ page.source }}">{{ page.source }}</a></p>
  {% endif %}
</article>
