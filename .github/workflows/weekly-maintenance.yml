name: Weekly Dependency Maintenance

on:
  # Run weekly on Mondays at 9 AM UTC (same cadence as the CLAUDE.md review workflow)
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-requirements:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # chromadb / pyodbc wheels are most reliable on 3.12
          python-version: '3.12'

      - name: Install pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: Recompile requirements.txt from requirements.in
        run: |
          pip-compile --upgrade --resolver=backtracking \
            --output-file=requirements.txt requirements.in

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- requirements.txt; then
            echo "No dependency updates this week."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Dependency updates found."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::group::requirements.txt diff"
            git diff -- requirements.txt
            echo "::endgroup::"
          fi

      - name: Create pull request
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="deps/weekly-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add requirements.txt
          git commit -m "chore(deps): weekly requirements.txt refresh"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(deps): weekly requirements.txt refresh (automated)" \
            --body "Automated weekly \`pip-compile --upgrade\` of \`requirements.in\`.

          Review the pin changes below, confirm CI/install passes, then merge.
          To change which packages are included, edit \`requirements.in\`, not this file." \
            --base main \
            --head "$BRANCH" \
            --label "dependencies" \
            --label "automated"

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Dependency Maintenance" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.check.outputs.has_changes }}" == "true" ]]; then
            echo "A PR with refreshed dependency pins was opened." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No dependency updates were needed this week." >> "$GITHUB_STEP_SUMMARY"
          fi
