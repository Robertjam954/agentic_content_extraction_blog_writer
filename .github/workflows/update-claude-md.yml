name: Update CLAUDE.md Documentation

on:
  # Run weekly on Mondays at 9 AM UTC
  schedule:
    - cron: "0 9 * * 1"

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      skip_pr:
        description: "Skip PR creation and commit directly to main (not recommended)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  update-claude-md:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better context

      - name: Generate unique branch name
        id: branch
        run: |
          BRANCH="update-claude-md-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Generated branch name: $BRANCH"

      - name: Create feature branch
        if: ${{ !inputs.skip_pr }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.branch_name }}"

      - name: Run Claude Code to update CLAUDE.md
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the maintenance instructions in
            .github/workflows/claude-md-review-prompt.md and carry them out.

            Additional instructions:
            - This is an automated workflow running in GitHub Actions
            - FIRST read the current CLAUDE.md at the repository root (it may
              not exist yet - in that case you will create it)
            - THEN systematically analyze the codebase as the instructions
              describe
            - FINALLY write the updated CLAUDE.md
            - Preserve existing content that is still accurate
            - Do not commit, push, or open a PR yourself - only edit the file;
              the workflow handles git
          claude_args: |
            --max-turns 30

      - name: Check for changes
        id: check-changes
        run: |
          # Catches both edits to a tracked CLAUDE.md and a newly created one
          if [ -n "$(git status --porcelain CLAUDE.md)" ]; then
            echo "Changes detected in CLAUDE.md"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "::group::CLAUDE.md changes"
            git diff HEAD -- CLAUDE.md || true
            echo "::endgroup::"
          else
            echo "No changes detected in CLAUDE.md"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git commit -m "chore: update CLAUDE.md documentation

          Automated update of CLAUDE.md based on current codebase analysis.
          Generated by the weekly CLAUDE.md maintenance workflow."

      - name: Push changes and create PR
        if: steps.check-changes.outputs.has_changes == 'true' && !inputs.skip_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"

          gh pr create \
            --title "chore: update CLAUDE.md documentation (automated)" \
            --body "## Automated CLAUDE.md Update

          This PR contains an automated update to CLAUDE.md based on an
          analysis of the current codebase.

          ### Review checklist
          - [ ] Verify the technical accuracy of updates
          - [ ] Check that no sensitive information was added
          - [ ] Confirm all paths and commands are correct

          ---
          *Generated by the weekly CLAUDE.md maintenance workflow.*
          *Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*" \
            --base main \
            --head "${{ steps.branch.outputs.branch_name }}"

      - name: Direct commit (if skip_pr is true)
        if: steps.check-changes.outputs.has_changes == 'true' && inputs.skip_pr
        run: |
          git push origin main
          echo "Changes committed directly to main branch (skip_pr was enabled)"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Workflow Summary"
            echo ""
            if [[ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]]; then
              echo "CLAUDE.md was updated."
              if [[ "${{ inputs.skip_pr }}" == "true" ]]; then
                echo "Changes were committed directly to main."
              else
                echo "A pull request was created for review (branch: \`${{ steps.branch.outputs.branch_name }}\`)."
              fi
            else
              echo "No updates needed - CLAUDE.md is already up to date."
            fi
            echo ""
            echo "*Run ID: ${{ github.run_id }}*"
          } >> "$GITHUB_STEP_SUMMARY"
